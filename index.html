<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1720">
<title>⛳ ゴルフ中古価格</title>
<style>
  :root { --bg:#0f1720; --card:#18222e; --line:#27323f; --txt:#e7edf3; --muted:#8aa0b4;
          --accent:#36b37e; --accent2:#4c9aff; --warn:#f5a623; --loss:#ff7a85; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font-family:system-ui,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
         padding-bottom:env(safe-area-inset-bottom); }
  header { position:sticky; top:0; z-index:10; background:rgba(15,23,32,.96); backdrop-filter:blur(8px);
           border-bottom:1px solid var(--line); padding:12px 14px; padding-top:calc(12px + env(safe-area-inset-top)); }
  header h1 { font-size:16px; margin:0; display:flex; align-items:center; gap:8px; }
  .back { color:var(--accent2); font-size:14px; background:none; border:none; padding:6px 2px; cursor:pointer; }
  .sub { color:var(--muted); font-size:11px; margin-top:2px; }
  .wrap { padding:12px 12px 40px; max-width:680px; margin:0 auto; }

  .hotbtn { display:block; width:100%; background:linear-gradient(135deg,#2a1712,#1e1210); border:1px solid #7a3b22;
            border-radius:14px; padding:16px 14px; font-size:16px; font-weight:700; color:#ffb38a;
            text-align:left; cursor:pointer; margin-bottom:12px; }
  .hotbtn .c { display:block; font-size:12px; font-weight:400; color:var(--muted); margin-top:5px; }
  .shop .hotp { flex:none; font-size:15px; font-weight:800; color:var(--accent); }
  .catgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .catbtn { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px 14px;
            font-size:17px; font-weight:700; color:var(--txt); text-align:left; cursor:pointer; }
  .catbtn .c { display:block; font-size:12px; font-weight:400; color:var(--muted); margin-top:6px; }

  .sortbar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .sortbar button { min-width:0; white-space:nowrap; }
  /* 5ボタンなので 3＋2 の2段に折り返す（flex-basis 30%） */
  .sortbar button { flex:1 1 30%; font-size:13px; padding:10px; border-radius:10px; border:1px solid var(--line);
                    background:var(--card); color:var(--muted); cursor:pointer; }
  .sortbar button.on { border-color:var(--accent); color:var(--accent); }

  .row { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line);
         border-radius:12px; padding:12px; margin-bottom:8px; cursor:pointer; }
  .row .rk { color:var(--muted); font-size:13px; width:22px; text-align:center; flex:none; }
  .row .mid { flex:1; min-width:0; }
  .row .nm { font-size:15px; font-weight:600; }
  .row .meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .row .pr { text-align:right; flex:none; }
  .row .profit { font-size:17px; font-weight:800; }
  .row .profit.win { color:var(--accent); } .row .profit.loss { color:var(--loss); }
  .row .mn { font-size:11px; color:var(--muted); margin-top:2px; }
  .row .pp { font-weight:700; }
  .row .pp.down { color:var(--accent); }   /* 安くなった=緑 */
  .row .pp.up { color:var(--loss); }        /* 同額以上=赤 */
  .row .dig { font-weight:700; color:var(--accent2); }   /* 掘り出し率 */
  .sortbar button { font-size:12px; padding:9px 6px; }
  .chev { color:var(--muted); flex:none; font-size:18px; }

  .metrics { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:6px 0 12px; }
  .m { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 8px; text-align:center; }
  .m .l { font-size:11px; color:var(--muted); } .m .v { font-size:18px; font-weight:800; margin-top:4px; }
  .m.avg .v { color:var(--accent); } .m.min .v { color:var(--accent2); }
  .gap { border:1px solid var(--line); border-radius:12px; padding:13px; margin-bottom:14px; }
  .gap.win { border-color:#22503c; background:#0f1f18; } .gap.loss { border-color:#5a2730; background:#1e1417; }
  .gap .f { font-size:12px; color:var(--muted); line-height:1.7; }
  .gap .big { font-size:24px; font-weight:800; margin-top:4px; }
  .gap.win .big { color:var(--accent); } .gap.loss .big { color:var(--loss); }

  .sechead { font-size:13px; font-weight:700; margin:16px 0 8px; }
  .shop { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line);
          border-radius:11px; padding:11px 12px; margin-bottom:7px; text-decoration:none; color:var(--txt); }
  .shop .p { font-size:15px; font-weight:800; flex:none; }
  .shop .p.sold { color:var(--loss); }
  .shop .si { flex:1; min-width:0; } .shop .st { font-size:12px; color:var(--muted); white-space:nowrap;
              overflow:hidden; text-overflow:ellipsis; } .shop .ss { font-size:11px; color:var(--accent2); margin-top:2px; }
  .shop .go { color:var(--muted); flex:none; }
  .ho { font-size:10px; color:var(--warn); margin-left:5px; }
  .empty { color:var(--muted); font-size:12px; padding:6px 2px; }
  .foot { color:var(--muted); font-size:11px; margin-top:24px; text-align:center; line-height:1.7; }
  .loading { color:var(--warn); padding:20px; text-align:center; }

  .searchbar { display:flex; gap:8px; margin-bottom:10px; }
  .searchbar input { flex:1; min-width:0; font-size:14px; padding:11px 12px; border-radius:10px;
                     border:1px solid var(--line); background:var(--card); color:var(--txt); }
  .searchbar button { font-size:14px; padding:0 14px; border-radius:10px; border:1px solid var(--line);
                      background:var(--card); color:var(--muted); cursor:pointer; flex:none; }
  .searchtip { font-size:11px; color:var(--muted); line-height:1.6; margin:0 2px 12px; }
  .scount { font-size:12px; color:var(--muted); margin:0 2px 10px; }
  .srow { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; }
  .srow .top { display:flex; align-items:center; gap:10px; cursor:pointer; }
  .srow .top .mid { flex:1; min-width:0; }
  .srow .top .nm { font-size:15px; font-weight:600; }
  .srow .top .meta { font-size:11px; color:var(--muted); margin-top:2px; }
  .srow .top .pr { text-align:right; flex:none; }
  .srow .top .profit { font-size:16px; font-weight:800; }
  .srow .top .profit.win { color:var(--accent); } .srow .top .profit.loss { color:var(--loss); }
  .hit { display:flex; gap:8px; align-items:center; background:#101a24; border:1px solid var(--line);
         border-radius:8px; padding:8px 10px; margin-top:6px; text-decoration:none; color:var(--txt); }
  .hit .hp { font-size:13px; font-weight:700; flex:none; } .hit .hp.sold { color:var(--loss); }
  .hit .ht { font-size:11px; color:var(--muted); flex:1; min-width:0; line-height:1.5; }
  .hit .hg { color:var(--muted); flex:none; font-size:14px; }
</style>
</head>
<body>
<header>
  <h1 id="title">⛳ ゴルフ中古価格</h1>
  <div class="sub" id="sub"></div>
</header>
<div class="wrap" id="app"><div class="loading">読み込み中…</div></div>

<script>
const yen = n => (n==null) ? "—" : "¥" + Number(n).toLocaleString();
// クラブ種類の短縮ラベル（一覧の説明行用）
const CAT_SHORT = { driver:"ドライバー", fw:"FW", ut:"UT", iron:"アイアン", chipper:"チッパー" };
const catShort = c => CAT_SHORT[c] || ((DATA&&DATA.categories.find(x=>x.key===c)||{}).label) || c || "";
const $ = s => document.querySelector(s);
let DATA = null, SORT = "profit";

async function load(){
  try{
    // 分単位のキャッシュキー＝開くたび最新を取得（日中の更新2/10/12…もすぐ反映）。
    // 同一分内の再読込だけキャッシュを使うので通信も無駄にならない。
    const t = new Date().toISOString().slice(0,16);
    DATA = await (await fetch("data.json?t=" + t, {cache:"no-cache"})).json();
  }catch(e){ $("#app").innerHTML = `<div class="empty">データを読み込めませんでした。</div>`; return; }
  route();
}
window.addEventListener("hashchange", route);

function param(){
  const h = new URLSearchParams(location.hash.slice(1));
  return { c: h.get("c"), m: h.get("m"), q: h.get("q") };
}
function go(hash){ location.hash = hash; }
function norm(s){ return (s||"").normalize("NFKC").toLowerCase(); }
function goSearch(v){ v=(v||"").trim(); if(v) go("q=" + encodeURIComponent(v)); }
function searchBar(value){
  return `<div class="searchbar">
     <input id="hq" type="text" placeholder="🔎 出品名・シャフトで検索（例: Diamana / G430 SFT）"
            value="${(value||'').replace(/"/g,'&quot;')}"
            onkeydown="if(event.key==='Enter')goSearch(this.value)">
     <button onclick="goSearch(document.getElementById('hq').value)">検索</button>
   </div>`;
}

function route(){
  if(!DATA) return;
  const h = new URLSearchParams(location.hash.slice(1));
  if(h.has("hot")) return viewHot();
  const { c, m, q } = param();
  if(m) return viewModel(m);
  if(q != null) return viewSearch(q);
  if(c) return viewList(c);
  return viewHome();
}

function setHead(title, sub, back){
  $("#title").innerHTML = (back?`<button class="back" onclick="history.back()">←</button> `:"⛳ ") + title;
  $("#sub").textContent = sub || "";
}

// --- ホーム：カテゴリ ---
function viewHome(){
  setHead("ゴルフ中古価格", `更新 ${DATA.generated_at}`, false);
  const nhot = DATA.models.reduce((n,m)=> n + (m.mercari_hot||[]).length, 0);
  $("#app").innerHTML = searchBar("")
    + `<button class="hotbtn" onclick="go('hot=1')">🔥 メルカリ激アツピックアップ
         <span class="c">直近実売より大幅に安い販売中出品${nhot ? `・いま${nhot}件` : ""}</span></button>`
    + `<button class="hotbtn" style="background:linear-gradient(135deg,#12202e,#101822);border-color:#234a7a;color:#8ec2ff"
         onclick="location.href='popularity.html'">🏆 メルカリ人気ランキング
         <span class="c">直近30日で何が何本売れたか・売切率・在庫過多・即売れ機種</span></button>`
    + `<div class="catgrid">` + DATA.categories.map(c=>
    `<button class="catbtn" onclick="go('c=${c.key}')">${c.label}<span class="c">${c.count}機種</span></button>`
  ).join("") + `</div>
    <div class="foot">中古最安で仕入れ→メルカリ平均で売却の試算損益。<br>
    手数料${Math.round(DATA.fee_rate*100)}%・送料${yen(DATA.shipping)}込み。タップで機種→ショップへ。</div>`;
}

// --- 🔥メルカリ激アツ（メルカリで買ってメルカリで売る候補） ---
function viewHot(){
  setHead("🔥 メルカリ激アツ", "販売中が直近売切の中央値より大幅に安い出品", true);
  const rows = [];
  for(const m of DATA.models){
    for(const h of (m.mercari_hot||[])) rows.push({ m, ...h });
  }
  rows.sort((a,b)=> (b.profit||0) - (a.profit||0));
  const html = rows.map(r=>`
    <a class="shop" href="${r.url||'#'}" target="_blank" rel="noopener">
      <div class="p">${yen(r.price)}</div>
      <div class="si">
        <div class="st">${(r.title||'').replace(/</g,'&lt;')}</div>
        <div class="ss">${r.m.label}・売切中央値${yen(r.sold_ref)}（${r.pct}%安）</div>
      </div>
      <div class="hotp">＋${yen(r.profit)}</div>
    </a>`).join("");
  $("#app").innerHTML =
    `<div class="searchtip">🔥 <b>メルカリで買ってメルカリで売る</b>候補。見込み益＝売切中央値×0.9 −
     送料${yen(DATA.shipping)} − 販売中価格。<b>状態・付属品・シャフト違いがあり得るので必ず現物確認を。</b>
     出品は売れて消えている場合があります（${DATA.generated_at} 時点）。</div>`
    + (html || `<div class="empty">いまは激アツ出品がありません（次の自動更新で入れ替わります）。</div>`);
  window.scrollTo(0,0);
}

// --- ランキング一覧 ---
function viewList(cat){
  const catLabel = (DATA.categories.find(c=>c.key===cat)||{}).label || cat;
  setHead(catLabel, "せどり益ランキング", true);
  const items = DATA.models.filter(m=>m.category===cat);
  const sorted = items.slice().sort((a,b)=>{
    if(SORT==="profit"){ const av=a.profit, bv=b.profit; if(av==null||bv==null) return (av==null)-(bv==null); return bv-av; }
    if(SORT==="min"){ const av=a.used.min, bv=b.used.min; if(av==null||bv==null) return (av==null)-(bv==null); return av-bv; }
    if(SORT==="prev"){ const av=a.prev_pct, bv=b.prev_pct; if(av==null||bv==null) return (av==null)-(bv==null); return av-bv; }
    if(SORT==="brand"){ return String(a.brand||"").localeCompare(String(b.brand||""),"ja") || String(a.label||"").localeCompare(String(b.label||""),"ja"); }
    const av=a.dig_pct, bv=b.dig_pct; if(av==null||bv==null) return (av==null)-(bv==null); return bv-av;
  });
  const rows = sorted.map((m,i)=>{
    const has = m.profit!=null, cls = !has?"":(m.profit>=0?"win":"loss");
    const ptxt = !has?`<span style="color:var(--muted);font-size:12px">データ不足</span>`
      : `<span class="profit ${cls}">${m.profit>=0?'＋':'−'}${yen(Math.abs(m.profit))}</span>`;
    const pc = m.prev_pct;
    const pp = (pc==null) ? "" :
      ` ・前日<span class="pp ${pc<0?'down':'up'}">${pc<0?'':'＋'}${pc}%</span>`;
    const dg = m.dig_pct;
    const dgtxt = (dg==null) ? "" : ` ・<span class="dig">掘り出し${dg}%</span>`;
    return `<div class="row" onclick="go('m=${m.key}')">
      <div class="rk">${i+1}</div>
      <div class="mid"><div class="nm">${m.label}</div>
        <div class="meta">${m.brand}・${m.year}・${catShort(m.category)}　中古${m.used.count}/フリマ${m.flea.count}件</div></div>
      <div class="pr">${ptxt}<div class="mn">最安${yen(m.used.min)}${dgtxt}${pp}</div></div>
      <div class="chev">›</div></div>`;
  }).join("");
  $("#app").innerHTML = searchBar("") +
    `<div class="sortbar">
       <button id="s_profit" class="${SORT==='profit'?'on':''}" onclick="setSort('profit')">💰せどり益</button>
       <button id="s_dig" class="${SORT==='dig'?'on':''}" onclick="setSort('dig')">掘り出し</button>
       <button id="s_min" class="${SORT==='min'?'on':''}" onclick="setSort('min')">最安順</button>
       <button id="s_prev" class="${SORT==='prev'?'on':''}" onclick="setSort('prev')">前日比</button>
       <button id="s_brand" class="${SORT==='brand'?'on':''}" onclick="setSort('brand')">メーカー順</button>
     </div>` + (rows || `<div class="empty">データがありません。</div>`);
}
function setSort(s){ SORT=s; viewList(param().c); }

// --- 機種詳細 ---
function viewModel(key){
  const m = DATA.models.find(x=>x.key===key);
  if(!m){ $("#app").innerHTML = `<div class="empty">機種が見つかりません。</div>`; return; }
  setHead(m.label, `${m.brand}・${m.year}`, true);
  const u=m.used, f=m.flea, p=m.profit;
  const win = (p!=null && p>=0);
  const med = m.gap_basis === "median";
  const fLabel = med ? "メルカリ中央値" : "メルカリ平均";
  const uLabel = med ? "中古中央値" : "中古最安";
  const gUsed = (m.gap_used!=null) ? m.gap_used : u.min;
  const gFlea = (m.gap_flea!=null) ? m.gap_flea : f.avg;
  const gap = (p==null) ? `<div class="gap"><div class="f">メルカリ実売データ不足のため試算できません。</div></div>` :
    `<div class="gap ${win?'win':'loss'}">
       <div class="f">${fLabel} ${yen(gFlea)} ×${(1-DATA.fee_rate).toFixed(2)} − 送料${yen(DATA.shipping)} − ${uLabel} ${yen(gUsed)}${med?'（アイアンは中央値で試算）':''}</div>
       <div class="big">${win?'＋':'−'}${yen(Math.abs(p))}</div>
       <div class="f">${win?'この条件なら利益が見込めます':'この条件だと赤字です'}（中古${u.count}・フリマ${f.count}件）</div>
     </div>`;
  const shopRow = (s, sold)=>`<a class="shop" href="${s.url||'#'}" target="_blank" rel="noopener">
      <div class="p ${sold?'sold':''}">${yen(s.price)}</div>
      <div class="si"><div class="st">${(s.title||'').replace(/</g,'&lt;')}</div>
        <div class="ss">${(s.shop||'').replace(/</g,'&lt;')}${s.head_only?'<span class="ho">ヘッドのみ</span>':''}</div></div>
      <div class="go">↗</div></a>`;
  const used = (m.used_samples||[]);
  const flea = (m.flea_samples||[]);
  $("#app").innerHTML = `
    <div class="metrics">
      <div class="m avg"><div class="l">①中古 平均</div><div class="v">${yen(u.avg)}</div></div>
      <div class="m min"><div class="l">②最安値</div><div class="v">${yen(u.min)}</div></div>
      <div class="m"><div class="l">③メルカリ実売</div><div class="v">${yen(f.avg)}</div></div>
    </div>
    ${gap}
    <div class="sechead">🏬 中古ショップ出品（安い順・タップで購入ページ）</div>
    ${used.length ? used.map(s=>shopRow(s,false)).join("") : `<div class="empty">該当なし</div>`}
    <div class="sechead">🏷️ メルカリ実売（平均に使った安値側3件）</div>
    ${flea.length ? flea.map(s=>shopRow(s,true)).join("") : `<div class="empty">該当なし</div>`}
    <div class="foot">価格は ${DATA.generated_at} 時点。出品リンクは在庫切れの場合があります。</div>`;
  window.scrollTo(0,0);
}

// --- 出品ページ名・シャフト検索 ---
function viewSearch(q){
  setHead("出品名・シャフト検索", "ページ名でピンポイント検索", true);
  $("#app").innerHTML =
    `<div class="searchbar">
       <input id="q" type="text" placeholder="例: xxio 12 S / Diamana / G430 SFT"
              value="${(q||'').replace(/"/g,'&quot;')}">
       <button onclick="document.getElementById('q').value='';runSearch('')">×</button>
     </div>
     <div class="searchtip">出品ページ名に含まれる全キーワードで絞り込みます（大小・全半角は無視）。
       ページ名にシャフト名やスペックが載っていれば、それで機種を特定できます。</div>
     <div id="results"></div>`;
  const inp = $("#q");
  inp.addEventListener("input", ()=> runSearch(inp.value));
  runSearch(q || "");
  inp.focus();
}

function runSearch(q){
  const box = document.getElementById("results");
  if(!box) return;
  const tokens = norm(q).split(/\s+/).filter(Boolean);
  if(!tokens.length){ box.innerHTML = `<div class="empty">キーワードを入力してください。</div>`; return; }
  const out = [];
  for(const m of DATA.models){
    const nameHit = tokens.every(t => norm(`${m.label} ${m.brand} ${m.year}`).includes(t));
    const hits = [];
    for(const [arr, sold] of [["used_samples",false],["flea_samples",true]]){
      for(const s of (m[arr]||[])){
        if(tokens.every(t => norm(s.title).includes(t))) hits.push({...s, sold});
      }
    }
    if(hits.length || nameHit) out.push({ m, hits });
  }
  out.sort((a,b)=>{ const av=a.m.profit, bv=b.m.profit;
    if(av==null||bv==null) return (av==null)-(bv==null); return bv-av; });
  if(!out.length){ box.innerHTML = `<div class="empty">一致する出品が見つかりませんでした。</div>`; return; }
  const total = out.reduce((n,o)=> n + o.hits.length, 0);
  box.innerHTML = `<div class="scount">${out.length}機種・${total}出品が一致</div>`
    + out.map(searchRowHTML).join("");
}

function searchRowHTML(o){
  const m = o.m, has = m.profit!=null, cls = !has?"":(m.profit>=0?"win":"loss");
  const ptxt = !has ? `<span style="color:var(--muted);font-size:12px">損益不足</span>`
    : `<span class="profit ${cls}">${m.profit>=0?'＋':'−'}${yen(Math.abs(m.profit))}</span>`;
  const hits = o.hits.map(s=>`<a class="hit" href="${s.url||'#'}" target="_blank" rel="noopener">
       <span class="hp ${s.sold?'sold':''}">${yen(s.price)}</span>
       <span class="ht">${(s.title||'').replace(/</g,'&lt;')}</span>
       <span class="hg">↗</span></a>`).join("");
  return `<div class="srow">
     <div class="top" onclick="go('m=${m.key}')">
       <div class="mid"><div class="nm">${m.label}</div>
